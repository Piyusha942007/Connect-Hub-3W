<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="32" height="32" fill="none">
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1976d2" />
      <stop offset="100%" stop-color="#1565c0" />
    </linearGradient>
  </defs>
  <!-- Main Hub connections -->
  <line x1="12" y1="12" x2="12" y2="4" stroke="url(#blue-grad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="12" y1="12" x2="5.5" y2="16.5" stroke="url(#blue-grad)" stroke-width="2.5" stroke-linecap="round" />
  <line x1="12" y1="12" x2="18.5" y2="16.5" stroke="url(#blue-grad)" stroke-width="2.5" stroke-linecap="round" />
  
  <!-- Outer nodes (circles) -->
  <circle cx="12" cy="4" r="3.5" fill="#ffffff" stroke="url(#blue-grad)" stroke-width="2.5" />
  <circle cx="5.5" cy="16.5" r="3.5" fill="#ffffff" stroke="url(#blue-grad)" stroke-width="2.5" />
  <circle cx="18.5" cy="16.5" r="3.5" fill="#ffffff" stroke="url(#blue-grad)" stroke-width="2.5" />

  <!-- Center node -->
  <circle cx="12" cy="12" r="4.5" fill="url(#blue-grad)" stroke="#ffffff" stroke-width="1.5" />
</svg>